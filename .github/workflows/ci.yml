name: CI and deploy

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://pricewatch:pricewatch@localhost:5432/pricewatch
      SHOPIFY_API_KEY: test
      SHOPIFY_API_SECRET: test
      SHOPIFY_APP_URL: https://price-watch.example.test
      SCOPES: read_products
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  deploy:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.COOLIFY_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Coolify deployment
        env:
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
        run: |
          test -n "$COOLIFY_DEPLOY_WEBHOOK"
          curl --fail-with-body --silent --show-error "$COOLIFY_DEPLOY_WEBHOOK"
